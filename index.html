<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SABSHOOP</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Cairo', sans-serif;
    background:#f9f8f5;
    text-align:center;
}

header{
    padding:80px 20px;
    background:linear-gradient(to bottom,#111827,#1f2937);
    color:white;
}

.site-logo{
    width:160px;
    border-radius:50%;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
    gap:25px;
    padding:40px;
}

.product{
    background:white;
    padding:15px;
    border-radius:15px;
}

.product img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.order-btn{
    margin-top:10px;
    padding:12px;
    background:#111827;
    color:white;
    border:none;
    border-radius:20px;
    width:100%;
}

#orderModal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:white;
    padding:20px;
    border-radius:15px;
    width:90%;
    max-width:400px;
}

input,select,textarea{
    width:100%;
    padding:10px;
    margin:6px 0;
    border:1px solid #ddd;
    border-radius:8px;
    font-family:'Cairo', sans-serif;
}

.confirm-btn{
    margin-top:15px;
    padding:12px;
    background:#10b981;
    color:white;
    border:none;
    border-radius:20px;
    width:100%;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
}

.messenger-btn{
    margin-top:10px;
    padding:12px;
    background:#0084FF;
    color:white;
    border:none;
    border-radius:20px;
    width:100%;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
}

.cancel-btn{
    margin-top:10px;
    padding:12px;
    background:#6b7280;
    color:white;
    border:none;
    border-radius:20px;
    width:100%;
    font-size:16px;
    cursor:pointer;
}

/* الإطار الجديد أسفل الصفحة */
.custom-frame {
    margin: 50px 20px 40px;
    padding: 25px 15px;
    background: white;
    border: 3px solid #10b981;
    border-radius: 20px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

.custom-frame p {
    font-size: 22px;
    font-weight: 700;
    color: #1f2937;
    margin: 0;
    line-height: 1.4;
}
</style>
</head>

<body>

<header>
<img src="logo.jpg" class="site-logo">
<h1>SABSHOOP</h1>
<p style="color:#fbbf24;">تصاميمك… مطبوعة بأسلوبك</p>
</header>

<section class="products">

<div class="product">
<img src="image-3.jpg">
<h3>Trust God's Plan Premium</h3>
<p>1900 دج</p>
<button class="order-btn" onclick="openForm('Trust God\'s Plan Premium')">اطلب الآن</button>
</div>

<div class="product">
<img src="image-6.jpg">
<h3>It's Never Luck</h3>
<p>1900 دج</p>
<button class="order-btn" onclick="openForm('It\'s Never Luck')">اطلب الآن</button>
</div>

<div class="product">
<img src="image-5.jpg">
<h3>Focus Power</h3>
<p>1900 دج</p>
<button class="order-btn" onclick="openForm('Focus Power')">اطلب الآن</button>
</div>

<div class="product">
<img src="image-4.jpg">
<h3>Zootopia Design</h3>
<p>1900 دج</p>
<button class="order-btn" onclick="openForm('Zootopia Design')">اطلب الآن</button>
</div>

<div class="product">
<img src="image-1.jpg">
<h3>Trust God's Plan</h3>
<p>1900 دج</p>
<button class="order-btn" onclick="openForm('Trust God\'s Plan')">اطلب الآن</button>
</div>

<div class="product">
<img src="image-2.jpg">
<h3>Itachi Design</h3>
<p>1900 دج</p>
<button class="order-btn" onclick="openForm('Itachi Design')">اطلب الآن</button>
</div>

</section>

<!-- الإطار الجديد أسفل المنتجات -->
<div class="custom-frame">
    <p>هل تفكر في ملصق خاص بك ؟! 🤔<br>
    نحن نوفر لك ايضا 🎨❇️</p>
</div>

<!-- الفورم -->
<div id="orderModal">
<div class="modal-content">

<h3>إتمام الطلب</h3>

<input id="name" placeholder="الاسم">
<input id="phone" placeholder="رقم الهاتف">
<textarea id="address" placeholder="العنوان"></textarea>

<select id="size">
<option value="">اختر المقاس</option>
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
<option>XXL</option>
</select>

<button class="confirm-btn" onclick="sendOrder()">تأكيد الطلب</button>
<button class="messenger-btn" onclick="openMessenger()">مراسلة عبر Messenger</button>
<button class="cancel-btn" onclick="closeForm()">إلغاء</button>

</div>
</div>

<script>
let selectedProduct="";

function openForm(name){
    selectedProduct=name;
    document.getElementById("orderModal").style.display="flex";
}

function closeForm(){
    document.getElementById("orderModal").style.display="none";
}

function sendOrder(){
    let name=document.getElementById("name").value;
    let phone=document.getElementById("phone").value;
    let address=document.getElementById("address").value;
    let size=document.getElementById("size").value;

    if(!name || !phone || !address || !size){
        alert("املأ كل المعلومات");
        return;
    }

    let message=`طلب جديد

المنتج: ${selectedProduct}
الاسم: ${name}
الهاتف: ${phone}
العنوان: ${address}
المقاس: ${size}`;

    let encodedMessage=encodeURIComponent(message);
    window.location.href=`whatsapp://send?phone=213542806878&text=${encodedMessage}`;
}

function openMessenger(){
    window.open("https://www.facebook.com/profile.php?id=100069958035941", "_blank");
}
</script>

</body>
</html>
